name: Release

on:
  release:
    types: [created]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Copy README and LICENSE to CLI
        run: |
          cp README.md apps/cli/README.md
          cp LICENSE apps/cli/LICENSE

      - name: Make CLI Executable
        run: chmod +x apps/cli/dist/cli.js

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: apps/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Compile Standalone Binaries
        run: bun run compile:all
        working-directory: apps/cli

      - name: Upload Binaries to GitHub Release
        run: gh release upload ${{ github.event.release.tag_name }} apps/cli/dist/bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
